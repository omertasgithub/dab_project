# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project

include:
  - resources/*.yml

variables:
  catalog:
    default: "citibike_dev"
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405612072409300.0.azuredatabricks.net/ # replace with your Workspace URL

  test:
    mode: production
    variables:
      catalog:
        default: "citibike_test"
      dev_flag:
        default: false
    presets:
      name_prefix: '[testing] '
    workspace:
      host: https://adb-7405604653807989.9.azuredatabricks.net/ # replace with your Workspace URL
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: c3e5cf76-4264-41bb-860f-50eea56c0672 # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: c3e5cf76-4264-41bb-860f-50eea56c0672 # update with your service principal name

  prod:
    mode: production
    variables:
      catalog:
        default: "citibike_prod"
      dev_flag:
        default: false
    workspace:
      host: https://adb-7405606627261896.16.azuredatabricks.net/ # replace with your Workspace URL
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: 0411dbdb-cd8f-48e7-93bb-67991aecf2ac # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: 0411dbdb-cd8f-48e7-93bb-67991aecf2ac # update with your service principal name
