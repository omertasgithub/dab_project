# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project

include:
  - resources/*.yml

variables:
  catalog:
    default: "citibike_dev"
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: ttps://adb-7405619490031892.12.azuredatabricks.net/ # replace with your Workspace URL

  test:
    mode: production
    variables:
      catalog:
        default: "citibike_test"
      dev_flag:
        default: false
    presets:
      name_prefix: '[testing] '
    workspace:
      host: https://adb-7405613000614232.12.azuredatabricks.net/ # replace with your Workspace URL
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: f9dcc048-31dc-44b2-8b04-b9e2c21a709b # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: f9dcc048-31dc-44b2-8b04-b9e2c21a709b # update with your service principal name

  prod:
    mode: production
    variables:
      catalog:
        default: "citibike_prod"
      dev_flag:
        default: false
    workspace:
      host: https://adb-7405618965747519.19.azuredatabricks.net/ # replace with your Workspace URL
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: b6104958-22c4-4359-9645-72d85318c7de # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: b6104958-22c4-4359-9645-72d85318c7de # update with your service principal name
